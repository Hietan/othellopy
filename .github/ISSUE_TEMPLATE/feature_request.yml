name: Feature request
description: Suggest a scoped improvement to othellopy.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Does this affect public APIs, examples, or existing behavior?
  - type: textarea
    id: docs
    attributes:
      label: Documentation or PyPI impact
      description: Would this require README, API docs, or PyPI metadata changes?

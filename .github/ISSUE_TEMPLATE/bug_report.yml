name: Bug report
description: Report a reproducible problem in othellopy.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include a minimal Python example when possible.
      placeholder: |
        1. Install ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Installation source
      description: Where did you install othellopy from?
      placeholder: "PyPI (`python -m pip install othellopy`) or GitHub branch"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: othellopy version or commit
      description: For PyPI installs, run `python -m pip show othellopy`.
      placeholder: "0.1.0, 0.2.0, or commit SHA"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      render: text

name: CI

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
      - "feat/**"
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --extra dev pytest

      - name: Run lint
        run: uv run --extra dev ruff check .

      - name: Run type check
        run: uv run --extra dev mypy src/othellopy

      - name: Build package
        run: uv build
